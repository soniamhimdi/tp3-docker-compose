# Configuration du serveur nginx

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # ─────────────────────────────────────
        # Toutes les requêtes vers /api
        # sont redirigées vers le service "api"
        # ─────────────────────────────────────
        location /api {
            # "api" ici = nom du service dans docker-compose
            # Docker Compose résout ce nom en IP interne automatiquement
            proxy_pass http://api:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ─────────────────────────────────────
        # Tout le reste = fichiers statiques React
        # ─────────────────────────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;
            # Important pour React Router : renvoie index.html pour toutes les routes
            try_files $uri $uri/ /index.html;
        }
    }
}